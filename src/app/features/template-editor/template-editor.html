<main class="template-editor">
  <app-catalog />

  <section class="template-editor__workspace" aria-label="Template editor workspace">
    <header class="template-editor__toolbar">
      @if (metadataStatus() === 'success') {
        <span class="template-editor__metadata-status template-editor__metadata-status--success">
          Metadata enviada
        </span>
      } @else if (metadataStatus() === 'error') {
        <span class="template-editor__metadata-status template-editor__metadata-status--error">
          No se pudo enviar la metadata
        </span>
      }

      <button
        class="template-editor__metadata-button"
        type="button"
        [disabled]="isSendingMetadata()"
        (click)="generateMetadata()"
      >
        {{ isSendingMetadata() ? 'Enviando...' : 'Generar metadata' }}
      </button>
    </header>

    <app-design-canvas />

    @if (hasGeneratedMetadata()) {
      <section class="template-editor__metadata" aria-label="Metadata generada">
        <textarea readonly [value]="generatedMetadata()"></textarea>
      </section>
    }
  </section>
</main>
