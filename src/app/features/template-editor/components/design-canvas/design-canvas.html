<section class="design-canvas" aria-label="Design canvas">
  <div
    class="design-canvas__surface"
    [class.design-canvas__surface--active]="isDraggingOver()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <div class="design-canvas__grid" aria-hidden="true">
      @for (_ of gridCells; track $index) {
        <div></div>
      }
    </div>

    @if (!hasComponents()) {
      <div class="design-canvas__empty">
        <p>Arrastra componentes desde el catalogo y sueltalos aqui.</p>
      </div>
    }

    <div class="design-canvas__layout">
      @if (dropPreview(); as preview) {
        <div
          class="design-canvas__drop-preview"
          [style.grid-column]="previewGridColumn(preview)"
          [style.grid-row]="previewGridRow(preview)"
          aria-hidden="true"
        ></div>
      }

      @for (component of components(); track component.id) {
        <div
          class="design-canvas__component"
          [class.design-canvas__component--moving]="draggingComponentId() === component.id"
          draggable="true"
          [style.grid-column]="componentGridColumn(component)"
          [style.grid-row]="componentGridRow(component)"
          (dragstart)="onComponentDragStart($event, component)"
          (dragend)="onComponentDragEnd()"
        >
          <button
            class="design-canvas__drag-button"
            type="button"
            draggable="true"
            title="Mover componente"
            aria-label="Mover componente"
            (dragstart)="onComponentDragStart($event, component)"
            (dragend)="onComponentDragEnd()"
            (pointerdown)="$event.stopPropagation()"
          >
            <span aria-hidden="true"></span>
          </button>

          <div class="design-canvas__component-content">
            <app-canvas-component-renderer
              [tag]="component.tag"
              [properties]="component.properties"
              [dataContext]="dataContext()"
              (propertyChange)="
                onComponentPropertyChanged(component.id, $event.propertyName, $event.value)
              "
            />
          </div>

          <button
            class="design-canvas__edit-button"
            type="button"
            title="Editar propiedades"
            aria-label="Editar propiedades del componente"
            (pointerdown)="$event.stopPropagation()"
            (click)="onEditPropertiesClick($event, component)"
          >
            ✎
          </button>

          <button
            class="design-canvas__delete-button"
            type="button"
            title="Eliminar componente"
            aria-label="Eliminar componente"
            (pointerdown)="$event.stopPropagation()"
            (click)="onDeleteComponentClick($event, component)"
          >
            <svg
              aria-hidden="true"
              viewBox="0 0 24 24"
              width="15"
              height="15"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v5" />
              <path d="M14 11v5" />
            </svg>
          </button>

          <button
            class="design-canvas__resize-handle"
            type="button"
            title="Redimensionar"
            aria-label="Redimensionar componente"
            (pointerdown)="onResizeStart($event, component)"
            (pointermove)="onResizeMove($event, component)"
            (pointerup)="onResizeEnd($event)"
            (pointercancel)="onResizeEnd($event)"
          ></button>
        </div>
      }
    </div>

    @if (selectedComponent(); as component) {
      <app-properties-panel
        [componentTag]="component.tag"
        [properties]="component.properties"
        [dataContext]="dataContext()"
        (propertiesChange)="onPropertiesChanged($event)"
        (dataContextChange)="onDataContextChanged($event)"
        (closePanel)="closePropertiesPanel()"
      />
    }
  </div>
</section>
