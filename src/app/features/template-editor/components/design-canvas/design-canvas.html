<section class="design-canvas" aria-label="Design canvas">
  <div
    class="design-canvas__surface"
    [class.design-canvas__surface--active]="isDraggingOver()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <div class="design-canvas__grid" aria-hidden="true">
      @for (_ of gridCells; track $index) {
        <div></div>
      }
    </div>

    @if (!hasComponents()) {
      <div class="design-canvas__empty">
        <p>Arrastra componentes desde el catalogo y sueltalos aqui.</p>
      </div>
    }

    <div class="design-canvas__layout">
      @for (component of components(); track component.id) {
        <div
          class="design-canvas__component"
          draggable="true"
          [style.grid-column]="componentGridColumn(component)"
          [style.grid-row]="componentGridRow(component)"
          (dragstart)="onComponentDragStart($event, component)"
        >
          <div class="design-canvas__component-content">
          @switch (component.tag) {
            @case ('app-box') {
              <app-box />
            }
            @case ('app-input') {
              <app-input />
            }
            @default {
              <div class="design-canvas__unsupported">
                {{ component.tag }}
              </div>
            }
          }
          </div>

          <button
            class="design-canvas__resize-handle"
            type="button"
            title="Redimensionar"
            aria-label="Redimensionar componente"
            (pointerdown)="onResizeStart($event, component)"
            (pointermove)="onResizeMove($event, component)"
            (pointerup)="onResizeEnd($event)"
            (pointercancel)="onResizeEnd($event)"
          ></button>
        </div>
      }
    </div>
  </div>
</section>
